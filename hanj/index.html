<!DOCTYPE html>
<html lang="ko">
<head> 
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>  새로운 친구와 연결하기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            light: '#FF70E5',
                            DEFAULT: '#FF2ED2',
                            dark: '#D800AA',
                        },
                        blue: {
                            light: '#70B8FF',
                            DEFAULT: '#2E8AFF',
                            dark: '#0066E0',
                        },
                        teal: '#00EEFF',
                        yellow: '#FFDD00',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite',
                        'color-shift': 'colorShift 10s infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(255, 46, 210, 0.8), 0 0 30px rgba(255, 46, 210, 0.6)' },
                            '50%': { boxShadow: '0 0 25px rgba(46, 138, 255, 0.8), 0 0 40px rgba(46, 138, 255, 0.6)' },
                        },
                        colorShift: {
                            '0%, 100%': { borderColor: '#FF2ED2' },
                            '50%': { borderColor: '#2E8AFF' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020E20 0%, #051A36 100%);
            color: white;
            overflow-x: hidden;
        }
        
        .bg-grid {
            background-image: 
                radial-gradient(#FF2ED2 1px, transparent 1px), 
                radial-gradient(#2E8AFF 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            opacity: 0.1;
        }
        
        
        .neon-text-blue {
            text-shadow: 
                0 0 5px rgba(46, 138, 255, 0.8),
                0 0 10px rgba(46, 138, 255, 0.5),
                0 0 15px rgba(46, 138, 255, 0.3);
        }
        
        .image-glow {
            box-shadow: 
                0 0 15px rgba(255, 46, 210, 0.5),
                0 0 30px rgba(46, 138, 255, 0.3);
        }
        
        .glass-card {
            background: rgba(5, 26, 54, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 46, 210, 0.2);
            box-shadow: 0 8px 32px rgba(46, 138, 255, 0.3);
        }
        
        .gradient-border {
            position: relative;
            border-radius: inherit;
        }
        
        .gradient-border::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(45deg, #FF2ED2, #2E8AFF, #00EEFF, #FF2ED2);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .btn-neon {
            background: linear-gradient(90deg, #FF2ED2, #2E8AFF);
            border: none;
            color: white;
            font-weight: bold;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.3s ease;
            transform: translateZ(0);
        }
        
        .btn-neon:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 10px rgba(255, 46, 210, 0.8), 
                0 0 20px rgba(46, 138, 255, 0.4);
        }
        
        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2E8AFF, #00EEFF);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        
        .btn-neon:hover::before {
            opacity: 1;
        }
        
        .line-icon {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #06C755, #04A847);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            animation: glow 2s ease-in-out infinite;
        }
        
        .notification {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background-color: #FF2ED2;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(255, 46, 210, 0.6);
        }
        
        .profile-stat {
            background: linear-gradient(90deg, rgba(255, 46, 210, 0.1), rgba(46, 138, 255, 0.1));
            border: 1px solid rgba(255, 46, 210, 0.3);
            border-radius: 9999px;
            padding: 0.3rem 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 0.5rem;
        }
        
        .image-grid > div:nth-child(1) {
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }
        
        .image-grid > div:nth-child(2) {
            grid-column: 3 / 5;
            grid-row: 1 / 2;
        }
        
        .image-grid > div:nth-child(3) {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }
        
        .image-grid > div:nth-child(4) {
            grid-column: 4 / 5;
            grid-row: 2 / 3;
        }
        
        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, auto);
            }
            
            .image-grid > div:nth-child(1) {
                grid-column: 1 / 2;
                grid-row: 1 / 2;
            }
            
            .image-grid > div:nth-child(2) {
                grid-column: 2 / 3;
                grid-row: 1 / 2;
            }
            
            .image-grid > div:nth-child(3) {
                grid-column: 1 / 2;
                grid-row: 2 / 3;
            }
            
            .image-grid > div:nth-child(4) {
                grid-column: 2 / 3;
                grid-row: 2 / 3;
            }
        }

        /* ===== 首屏新样式 ===== */
        .hero-section {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .hero-section {
                min-height: auto;
                padding-top: 1rem;
                padding-bottom: 1.5rem;
            }
        }

        .hero-avatar-wrap {
            position: relative;
            display: inline-block;
        }

        .hero-avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: conic-gradient(from 0deg, #FF2ED2, #2E8AFF, #00EEFF, #FF2ED2) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hero-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        @media (min-width: 769px) {
            .hero-avatar {
                width: 220px;
                height: 220px;
            }
        }

        .hero-online-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #06C755;
            border-radius: 50%;
            border: 3px solid #051A36;
            animation: pulse 2s infinite;
        }

        @keyframes heroFadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-fade-1 { animation: heroFadeUp 0.6s 0.1s both; }
        .hero-fade-2 { animation: heroFadeUp 0.6s 0.25s both; }
        .hero-fade-3 { animation: heroFadeUp 0.6s 0.4s both; }
        .hero-fade-4 { animation: heroFadeUp 0.6s 0.55s both; }
        .hero-fade-5 { animation: heroFadeUp 0.6s 0.7s both; }

        .hero-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            animation: floatParticle 6s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- LINE Fixed Icon -->
    <div class="line-icon animate-pulse-fast" onclick="openSite()">
        <i class="fab fa-line text-white text-3xl"></i>
        <div class="notification">1</div>
    </div>

    <div class="relative min-h-screen">
        <!-- Background Elements -->
        <div class="absolute inset-0 bg-grid pointer-events-none"></div>
        <div class="absolute top-20 left-10 w-40 h-40 rounded-full bg-pink-dark/20 blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-60 h-60 rounded-full bg-blue-dark/20 blur-3xl"></div>
        
        <div class="container mx-auto px-4 py-6 relative z-10">
            <div class="max-w-4xl mx-auto">

                <!-- ===== 全新首屏 ===== -->
                <div class="hero-section">
                    <!-- 装饰粒子 -->
                    <div class="hero-particle" style="width:6px;height:6px;background:#FF2ED2;top:12%;left:8%;animation-delay:0s;"></div>
                    <div class="hero-particle" style="width:4px;height:4px;background:#2E8AFF;top:25%;right:12%;animation-delay:1.5s;"></div>
                    <div class="hero-particle" style="width:5px;height:5px;background:#00EEFF;bottom:20%;left:15%;animation-delay:3s;"></div>
                    <div class="hero-particle" style="width:4px;height:4px;background:#FF70E5;bottom:30%;right:18%;animation-delay:4s;"></div>
                    <div class="hero-particle" style="width:3px;height:3px;background:#FFDD00;top:40%;left:5%;animation-delay:2s;"></div>

                    <div class="flex flex-col items-center text-center px-2">
                        <!-- 头像 -->
                        <div class="hero-avatar-wrap hero-fade-1 mb-5">
                            <div class="hero-avatar-ring"></div>
                            <img src="img/1.jpg" alt="태현 프로필" class="hero-avatar">
                            <div class="hero-online-dot"></div>
                        </div>

                        <!-- 名字 + 年龄 -->
                        <div class="hero-fade-2 mb-3">
                            <h1 class="text-4xl md:text-5xl font-bold leading-tight">
                                <span class="bg-gradient-to-r from-pink to-blue text-transparent bg-clip-text">태현</span>
                            </h1>
                            <p class="text-gray-400 text-base mt-1">27세 · <span class="text-teal">온라인</span></p>
                        </div>

                        <!-- 简介 -->
                        <p class="hero-fade-3 text-gray-300 text-sm md:text-base max-w-md leading-relaxed mb-4">
                            저는 여행과 맛있는 음식을 사랑해요. 당신과 제 이야기를 나눌 수 있다면 정말 기쁠 거예요! 삶의 즐거움을 아는 멋진 분이라면, 친구가 되고 싶어요.
                        </p>

                        <!-- 标签 -->
                        <div class="hero-fade-4 flex flex-wrap justify-center mb-6">
                            <div class="profile-stat">
                                <i class="fas fa-plane text-blue-light"></i>
                                <span>여행 애호가</span>
                            </div>
                            <div class="profile-stat">
                                <i class="fas fa-utensils text-teal"></i>
                                <span>미식가</span>
                            </div>
                            <div class="profile-stat">
                                <i class="fas fa-book text-yellow"></i>
                                <span>적합</span>
                            </div>
                        </div>

                        <!-- CTA 按钮 -->
                        <div class="hero-fade-5 w-full max-w-xs">
                            <button onclick="openSite()" class="btn-neon px-6 py-3.5 rounded-full animate-pulse-fast flex items-center justify-center text-lg w-full">
                                <i class="fab fa-line mr-2 text-xl"></i>
                                LINE으로 채팅하기
                            </button>
                            <p class="text-xs text-gray-500 mt-3">함께 이야기를 나눠요 💬</p>
                        </div>
                    </div>
                </div>

                <!-- Photo Gallery Section -->
                <div class="glass-card rounded-2xl p-4 mb-6">
                    <h2 class="text-xl font-bold mb-3 neon-text-blue">나의 포토 갤러리</h2>
                    
                    <div class="image-grid">
                        <div class="gradient-border rounded-lg overflow-hidden">
                            <img src="img/2.jpg" alt="티나 사진 1" class="w-full h-full object-cover">
                        </div>
                        
                        <div class="gradient-border rounded-lg overflow-hidden">
                            <img src="img/3.jpg" alt="티나 사진 2" class="w-full h-full object-cover">
                        </div>
                        
                        <div class="gradient-border rounded-lg overflow-hidden">
                            <img src="img/4.jpg" alt="티나 사진 3" class="w-full h-full object-cover">
                        </div>
                        
                        <div class="gradient-border rounded-lg overflow-hidden">
                            <img src="img/1.jpg" alt="티나 사진 4" class="w-full h-full object-cover">
                        </div>
                    </div>
                </div>
                
                <!-- Call to Action -->
                <div class="glass-card rounded-2xl p-6 text-center">
                    <p class="text-gray-300 mb-4 italic">
                        "진심 어린 만남과 의미 있는 대화를 믿어요. 서로 알아가 볼까요?"
                    </p>
                    
                    <button onclick="openSite()" class="btn-neon px-8 py-4 rounded-full text-lg inline-flex items-center mx-auto">
                        <i class="fab fa-line mr-2 text-xl"></i>
                        지금 바로 연결하기
                    </button>
                    
                    <p class="text-xs text-gray-400 mt-4">
                        당신과의 대화를 기대하고 있어요. 함께 아름다운 추억을 만들어요!
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openSite() {
            window.location.href = "https://www.baidu.com";
        } 
        
    </script>
 
</body>
</html>
